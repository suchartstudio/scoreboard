<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scoreboard Controller (Mobile)</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #121212; --bg-card: #1e1e1e; --text-main: #e0e0e0; --border-color: #333333; --input-bg: #2d2d2d; }
        body { font-family: 'Chakra Petch', sans-serif; padding: 15px; background: var(--bg-main); color: var(--text-main); margin: 0; }
        
        .control-box { background: var(--bg-card); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border-color); }
        h3 { margin-top: 0; font-size: 18px; color: #fff; border-bottom: 1px solid #444; padding-bottom: 8px; margin-bottom: 15px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        button { font-family: 'Chakra Petch'; padding: 12px; font-size: 15px; font-weight: bold; width: 100%; border-radius: 6px; cursor: pointer; border: none; background: #3a3a3a; color: white; transition: 0.2s; }
        button:active { transform: scale(0.98); background: #555; }
        button.btn-green { background: #2e7d32; }
        button.btn-red { background: #c62828; }
        button.btn-blue { background: #1565c0; }
        button.btn-orange { background: #e65100; }
        button.btn-purple { background: #6a1b9a; }

        input[type="text"], input[type="number"] { font-family: 'Chakra Petch'; width: 100%; box-sizing: border-box; padding: 10px; font-size: 16px; background: var(--input-bg); color: white; border: 1px solid var(--border-color); border-radius: 6px; margin-bottom: 8px; }
        input[type="color"] { width: 100%; height: 40px; border: none; cursor: pointer; background: transparent; padding: 0; }
        
        .score-display { font-size: 35px; font-weight: bold; text-align: center; margin: 10px 0; font-variant-numeric: tabular-nums; }
        .color-label { display: flex; flex-direction: column; font-size: 14px; margin-bottom: 5px; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px 5px; background: #2d2d2d; color: #aaa; border-radius: 8px; font-size: 14px; }
        .tab-btn.active { background: #1565c0; color: white; border: 2px solid #fff; }
        
        .upload-row { display: flex; gap: 10px; align-items: center; margin-bottom: 5px; }
        .upload-row input[type="file"] { flex: 1; font-size: 12px; }

        .penalty-box { display: none; background: #333; padding: 10px; border-radius: 8px; margin-top: 10px; border: 2px solid #ffeb3b; }
        .history-item { background: #2a2a2a; padding: 8px; margin-top: 5px; border-radius: 4px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>
    <h2 style="text-align: center; margin-bottom: 15px;">⚙️ แผงควบคุม</h2>

    <div class="tabs">
        <button id="tab-futsal" class="tab-btn active" onclick="changeSport('futsal')">⚽ ฟุตบอล</button>
        <button id="tab-basketball" class="tab-btn" onclick="changeSport('basketball')">🏀 บาสเกตบอล</button>
        <button id="tab-volleyball" class="tab-btn" onclick="changeSport('volleyball')">🏐 นับเซ็ต</button>
    </div>

    <div class="control-box">
        <h3>🏆 ข้อมูลการแข่งขัน</h3>
        <input type="text" id="eventName" placeholder="ชื่อรายการแข่งขัน" oninput="updateState('eventName', this.value)">
        
        <div style="margin-top: 10px;">
            <strong>โลโก้รายการ:</strong>
            <div class="upload-row">
                <input type="file" id="logoMainUpload" accept="image/*">
                <button class="btn-blue" onclick="state.showLogo = !state.showLogo; emitState();" style="width: 80px;">เปิด/ปิด</button>
            </div>
            <div id="statusMain" style="font-size: 12px; color: #ffca28;"></div>
        </div>
    </div>

    <div class="control-box">
        <h3>🔄 ระยะเวลาแข่งขัน (ปัจจุบัน: <input type="text" id="periodInput" onchange="updateState('period', this.value)" style="width: 80px; display:inline-block; padding: 5px; text-align: center;">)</h3>
        <div class="grid-2" style="margin-bottom: 10px;">
            <button class="btn-green" onclick="updateState('period', '1')">ครึ่ง 1</button>
            <button class="btn-green" onclick="updateState('period', '2')">ครึ่ง 2</button>
            <button class="btn-orange" onclick="updateState('period', 'ET1')">ต่อเวลา 1</button>
            <button class="btn-orange" onclick="updateState('period', 'ET2')">ต่อเวลา 2</button>
        </div>
        <button id="penaltyToggleBtn" class="btn-purple" onclick="togglePenaltyMode()">⚽ โหมดยิงจุดโทษ (เปิด/ปิด)</button>
    </div>

    <div class="control-box" id="timerControlSection">
        <h3>⏱️ ควบคุมเวลา</h3>
        <div class="score-display" id="timeDisplay">00:00</div>
        <div class="grid-2">
            <button class="btn-green" id="timerToggleBtn" onclick="toggleTimer()">เริ่มเวลา</button>
            <button class="btn-orange" onclick="state.timerDirection = (state.timerDirection === 'up' ? 'down' : 'up'); emitState();">
                ทิศทาง: <span id="dirDisplay">ขึ้น</span>
            </button>
        </div>
        <div class="grid-2" style="margin-top: 10px;">
            <input type="number" id="customMin" placeholder="นาที" min="0">
            <input type="number" id="customSec" placeholder="วินาที" min="0" max="59">
        </div>
        <button onclick="setCustomTime()" style="margin-top: 5px;" class="btn-blue">ตั้งเวลาตามที่กรอก</button>
    </div>

    <div class="control-box">
        <h3>🖼️ โลโก้ทีมซ้าย-ขวา</h3>
        <button class="btn-blue" onclick="state.showTeamLogos = !state.showTeamLogos; emitState();">เปิด/ปิด โลโก้ทั้ง 2 ทีมพร้อมกัน</button>
    </div>

    <div class="grid-2">
        <div class="control-box">
            <h3 style="color: #ff5252;">ทีม A (ซ้าย)</h3>
            <div class="upload-row"><input type="file" id="logoAUpload" accept="image/*"></div>
            <div id="statusA" style="font-size: 12px; color: #ffca28; margin-bottom: 10px;"></div>

            <input type="text" id="nameA" placeholder="ชื่อทีม A" oninput="updateState('nameA', this.value)">
            
            <div class="score-display" id="scoreADisplay">0</div>
            <div class="grid-2">
                <button class="btn-green" onclick="updateStat('scoreA', 1)">+ แต้ม</button>
                <button class="btn-red" onclick="updateStat('scoreA', -1)">- แต้ม</button>
            </div>
            
            <div id="penaltyBoxA" class="penalty-box">
                <div style="text-align: center; font-weight: bold; color: #ffeb3b; margin-bottom: 5px;">ยิงจุดโทษ ทีม A</div>
                <div class="grid-2" style="margin-top: 5px;">
                    <button class="btn-green" onclick="addPenalty('A', 'hit')">✔️ เข้า</button>
                    <button class="btn-red" onclick="addPenalty('A', 'miss')">❌ ไม่เข้า</button>
                </div>
                <button class="btn-orange" onclick="undoPenalty('A')" style="margin-top: 5px;">ลบดวงล่าสุด</button>
                <div id="penDisplayTextA" style="text-align: center; margin-top: 5px; font-size: 14px;"></div>
            </div>

            <div style="text-align: center; margin-top: 15px; font-weight: bold;">ฟาวล์: <span id="foulADisplay">0</span></div>
            <div class="grid-2" style="margin-top: 5px;">
                <button onclick="updateStat('foulA', 1)">+</button>
                <button onclick="updateStat('foulA', -1)">-</button>
            </div>
        </div>

        <div class="control-box">
            <h3 style="color: #448aff;">ทีม B (ขวา)</h3>
            <div class="upload-row"><input type="file" id="logoBUpload" accept="image/*"></div>
            <div id="statusB" style="font-size: 12px; color: #ffca28; margin-bottom: 10px;"></div>

            <input type="text" id="nameB" placeholder="ชื่อทีม B" oninput="updateState('nameB', this.value)">
            
            <div class="score-display" id="scoreBDisplay">0</div>
            <div class="grid-2">
                <button class="btn-green" onclick="updateStat('scoreB', 1)">+ แต้ม</button>
                <button class="btn-red" onclick="updateStat('scoreB', -1)">- แต้ม</button>
            </div>

            <div id="penaltyBoxB" class="penalty-box">
                <div style="text-align: center; font-weight: bold; color: #ffeb3b; margin-bottom: 5px;">ยิงจุดโทษ ทีม B</div>
                <div class="grid-2" style="margin-top: 5px;">
                    <button class="btn-green" onclick="addPenalty('B', 'hit')">✔️ เข้า</button>
                    <button class="btn-red" onclick="addPenalty('B', 'miss')">❌ ไม่เข้า</button>
                </div>
                <button class="btn-orange" onclick="undoPenalty('B')" style="margin-top: 5px;">ลบดวงล่าสุด</button>
                <div id="penDisplayTextB" style="text-align: center; margin-top: 5px; font-size: 14px;"></div>
            </div>

            <div style="text-align: center; margin-top: 15px; font-weight: bold;">ฟาวล์: <span id="foulBDisplay">0</span></div>
            <div class="grid-2" style="margin-top: 5px;">
                <button onclick="updateStat('foulB', 1)">+</button>
                <button onclick="updateStat('foulB', -1)">-</button>
            </div>
        </div>
    </div>

    <div class="control-box" id="setMatchBox" style="display: none;">
        <h3>🏐 บันทึกผลการแข่งขันแต่ละเซต</h3>
        <button class="btn-blue" onclick="endSet()">จบเซตนี้และบันทึกคะแนน (End Set)</button>
        <div id="setHistoryList" style="margin-top: 10px;"></div>
    </div>

    <div class="control-box">
        <h3>🎨 สีเสื้อทีมและธีม</h3>
        <div class="grid-2">
            <label class="color-label">ทีม A: <input type="color" id="colorA" onchange="updateState('colorA', this.value)"></label>
            <label class="color-label">ทีม B: <input type="color" id="colorB" onchange="updateState('colorB', this.value)"></label>
            <label class="color-label">พื้นบอร์ด: <input type="color" id="bgColor" onchange="updateState('bgColor', this.value)"></label>
            <label class="color-label">ตัวอักษร: <input type="color" id="textColor" onchange="updateState('textColor', this.value)"></label>
        </div>
    </div>
    
    <div class="control-box" style="background: #210404; border-color: #521111;">
        <button class="btn-red" onclick="resetAllData()">⚠️ รีเซ็ตข้อมูลทั้งหมดเริ่มต้นใหม่</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5o9aY3La7nK7gCHbjM2ToolmnoE0y-is",
            authDomain: "post-it-kk-election.firebaseapp.com",
            projectId: "post-it-kk-election",
            storageBucket: "post-it-kk-election.firebasestorage.app",
            messagingSenderId: "323275742590",
            appId: "1:323275742590:web:7bbb20241bca6cca46672f",
            databaseURL: "https://post-it-kk-election-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const stateRef = ref(db, 'scoreboard/state');

        const defaultState = {
            sport: 'futsal', eventName: 'รายการแข่งขัน', period: '1',
            showLogo: false, logoUrl: '',
            showTeamLogos: false, logoUrlA: '', logoUrlB: '',
            isPenalty: false, penaltyA: [], penaltyB: [],
            setHistory: [],
            timerDirection: 'up',
            timer: { minutes: 0, seconds: 0, isRunning: false, lastUpdatedTime: 0 },
            scoreA: 0, scoreB: 0, foulA: 0, foulB: 0, nameA: 'TEAM A', nameB: 'TEAM B',
            bgColor: '#000000', colorA: '#ff5252', colorB: '#448aff', textColor: '#ffffff'
        };

        window.state = { ...defaultState };

        window.emitState = function() { set(stateRef, state); updateUI(); };
        window.updateState = function(key, value) { state[key] = value; emitState(); };
        window.updateStat = function(key, val) { state[key] = Math.max(0, state[key] + val); emitState(); };

        // จัดการจุดโทษแบบจุดสี
        window.addPenalty = function(team, result) {
            if (!state.penaltyA) state.penaltyA = [];
            if (!state.penaltyB) state.penaltyB = [];
            if (team === 'A') state.penaltyA.push(result);
            if (team === 'B') state.penaltyB.push(result);
            emitState();
        };
        window.undoPenalty = function(team) {
            if (team === 'A' && state.penaltyA) state.penaltyA.pop();
            if (team === 'B' && state.penaltyB) state.penaltyB.pop();
            emitState();
        };
        window.togglePenaltyMode = function() {
            state.isPenalty = !state.isPenalty;
            if (state.isPenalty) state.period = 'PEN';
            emitState();
        };

        // จัดการบันทึกเซ็ต
        window.endSet = function() {
            if(!state.setHistory) state.setHistory = [];
            state.setHistory.push({ setNum: state.setHistory.length + 1, scoreA: state.scoreA, scoreB: state.scoreB });
            if (state.scoreA > state.scoreB) state.foulA += 1;
            else if (state.scoreB > state.scoreA) state.foulB += 1;
            state.scoreA = 0; state.scoreB = 0; 
            let pNum = parseInt(state.period);
            if(!isNaN(pNum)) state.period = (pNum + 1).toString();
            emitState();
        };
        window.resetAllData = function() {
            if(confirm("รีเซ็ตข้อมูลทั้งหมดใช่หรือไม่?")) {
                state = JSON.parse(JSON.stringify(defaultState));
                emitState(); location.reload();
            }
        };

        window.changeSport = function(sportType) {
            state.sport = sportType;
            state.timerDirection = (sportType === 'basketball') ? 'down' : 'up';
            emitState();
        };

        window.toggleTimer = function() {
            if (!state.timer.isRunning) {
                state.timer.isRunning = true;
                state.timer.lastUpdatedTime = Date.now();
            } else {
                let totalSecs = calculateCurrentSeconds(state.timer, state.timerDirection);
                state.timer.minutes = Math.floor(totalSecs / 60);
                state.timer.seconds = totalSecs % 60;
                state.timer.isRunning = false;
                state.timer.lastUpdatedTime = 0;
            }
            emitState();
        };

        window.setCustomTime = function() {
            state.timer.minutes = parseInt(document.getElementById('customMin').value) || 0;
            state.timer.seconds = parseInt(document.getElementById('customSec').value) || 0;
            state.timer.isRunning = false;
            state.timer.lastUpdatedTime = 0;
            emitState();
        };

        function calculateCurrentSeconds(timer, direction) {
            let baseSecs = (timer.minutes * 60) + timer.seconds;
            if (timer.isRunning && timer.lastUpdatedTime > 0) {
                let diff = Math.floor((Date.now() - timer.lastUpdatedTime) / 1000);
                return direction === 'up' ? baseSecs + diff : Math.max(0, baseSecs - diff);
            }
            return baseSecs;
        }

        setInterval(() => {
            if (state.timer.isRunning) {
                let totalSecs = calculateCurrentSeconds(state.timer, state.timerDirection);
                let m = Math.floor(totalSecs / 60).toString().padStart(2, '0');
                let s = (totalSecs % 60).toString().padStart(2, '0');
                document.getElementById('timeDisplay').innerText = `${m}:${s}`;
            }
        }, 500);

        function countPenalty(arr) {
            if(!arr) return "ยิง 0 / เข้า 0";
            let hits = arr.filter(x => x === 'hit').length;
            return `ยิง ${arr.length} / เข้า ${hits}`;
        }

        function updateUI() {
            if (document.activeElement.id !== 'eventName') document.getElementById('eventName').value = state.eventName;
            if (document.activeElement.id !== 'nameA') document.getElementById('nameA').value = state.nameA;
            if (document.activeElement.id !== 'nameB') document.getElementById('nameB').value = state.nameB;
            if (document.activeElement.id !== 'periodInput') document.getElementById('periodInput').value = state.period;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-' + state.sport).classList.add('active');

            document.getElementById('timerControlSection').style.display = (state.sport === 'volleyball') ? 'none' : 'block';
            document.getElementById('setMatchBox').style.display = (state.sport === 'volleyball') ? 'block' : 'none';

            document.getElementById('scoreADisplay').innerText = state.scoreA;
            document.getElementById('scoreBDisplay').innerText = state.scoreB;
            document.getElementById('foulADisplay').innerText = state.foulA;
            document.getElementById('foulBDisplay').innerText = state.foulB;
            
            document.getElementById('penaltyBoxA').style.display = state.isPenalty ? 'block' : 'none';
            document.getElementById('penaltyBoxB').style.display = state.isPenalty ? 'block' : 'none';
            document.getElementById('penDisplayTextA').innerText = countPenalty(state.penaltyA);
            document.getElementById('penDisplayTextB').innerText = countPenalty(state.penaltyB);
            document.getElementById('penaltyToggleBtn').style.background = state.isPenalty ? '#c62828' : '#6a1b9a'; 

            document.getElementById('colorA').value = state.colorA;
            document.getElementById('colorB').value = state.colorB;
            document.getElementById('bgColor').value = state.bgColor;
            document.getElementById('textColor').value = state.textColor;

            document.getElementById('timerToggleBtn').innerText = state.timer.isRunning ? "หยุดเวลา" : "เริ่มเวลา";
            document.getElementById('timerToggleBtn').style.background = state.timer.isRunning ? "#c62828" : "#2e7d32";
            document.getElementById('dirDisplay').innerText = state.timerDirection === 'up' ? 'ขึ้น' : 'ลง';

            if (!state.timer.isRunning) {
                let m = state.timer.minutes.toString().padStart(2, '0');
                let s = state.timer.seconds.toString().padStart(2, '0');
                document.getElementById('timeDisplay').innerText = `${m}:${s}`;
            }

            const listContainer = document.getElementById('setHistoryList');
            listContainer.innerHTML = "";
            if (state.setHistory && state.setHistory.length > 0) {
                state.setHistory.forEach(item => {
                    let div = document.createElement('div');
                    div.className = "history-item";
                    div.innerText = `เซต ${item.setNum} : ${item.scoreA} - ${item.scoreB}`;
                    listContainer.appendChild(div);
                });
            } else {
                listContainer.innerHTML = `<div style="text-align:center;color:#666;">ยังไม่มีประวัติการแข่งขัน</div>`;
            }
        }

        onValue(stateRef, (snapshot) => {
            const data = snapshot.val();
            if (data) { 
                state = { ...state, ...data }; 
                if(!state.penaltyA) state.penaltyA = [];
                if(!state.penaltyB) state.penaltyB = [];
                updateUI(); 
            }
        });

        // Cloudinary
        const CLOUD_NAME = 'dk0ypev4m'; 
        const UPLOAD_PRESET = 'khonkaen_preset';
        async function handleUpload(inputId, statusId, urlKey) {
            const file = document.getElementById(inputId).files[0];
            if (!file) return;
            const statusLabel = document.getElementById(statusId);
            statusLabel.innerText = "⏳ กำลังอัปโหลด...";
            const formData = new FormData(); formData.append('file', file); formData.append('upload_preset', UPLOAD_PRESET);
            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
                const data = await response.json();
                if (data.secure_url) {
                    statusLabel.innerText = "✅ สำเร็จ!"; statusLabel.style.color = "#66bb6a";
                    state[urlKey] = data.secure_url; emitState(); 
                }
            } catch (error) { statusLabel.innerText = "❌ ผิดพลาด"; statusLabel.style.color = "#f44336"; }
        }
        document.getElementById('logoMainUpload').addEventListener('change', () => { handleUpload('logoMainUpload', 'statusMain', 'logoUrl'); state.showLogo = true; });
        document.getElementById('logoAUpload').addEventListener('change', () => handleUpload('logoAUpload', 'statusA', 'logoUrlA'));
        document.getElementById('logoBUpload').addEventListener('change', () => handleUpload('logoBUpload', 'statusB', 'logoUrlB'));
    </script>
</body>
</html>
