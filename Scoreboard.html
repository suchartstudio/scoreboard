<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Scoreboard View</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700;900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: transparent; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Chakra Petch', sans-serif; }
        
        .scoreboard-container { width: 100vw; max-width: 100%; aspect-ratio: 16 / 9; position: relative; display: flex; justify-content: center; align-items: center; }
        
        .board { width: 1920px; height: 1080px; transform-origin: center center; position: absolute; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }

        .header { display: flex; align-items: center; justify-content: center; margin-top: 50px; background: rgba(0,0,0,0.6); padding: 10px 50px; border-radius: 20px; border: 3px solid #444; }
        .event-name { font-size: 60px; font-weight: 700; text-transform: uppercase; margin: 0 30px; }
        .logo { max-height: 120px; border-radius: 10px; display: none; }

        .main-score-area { display: flex; justify-content: center; align-items: center; gap: 50px; margin-top: 40px; }
        
        .team-box { display: flex; flex-direction: column; align-items: center; background: rgba(20,20,20,0.85); border: 5px solid; padding: 40px; border-radius: 30px; width: 600px; }
        #teamABox { border-color: #ff5252; }
        #teamBBox { border-color: #448aff; }

        .team-name { font-size: 70px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
        .score { font-size: 250px; font-weight: 900; line-height: 1; margin: 20px 0; font-variant-numeric: tabular-nums; }
        
        .stats-row { display: flex; justify-content: space-between; width: 100%; font-size: 45px; margin-top: 10px; color: #ffeb3b; }

        .center-info { display: flex; flex-direction: column; align-items: center; }
        .timer-box { font-size: 180px; font-weight: 900; background: rgba(0,0,0,0.8); padding: 20px 40px; border-radius: 30px; border: 4px solid #fff; font-variant-numeric: tabular-nums; margin-bottom: 30px; }
        .period-box { font-size: 60px; font-weight: 700; background: #333; padding: 10px 40px; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="scoreboard-container" id="scale-container">
        <div class="board" id="main-board">
            
            <div class="header">
                <img id="mainLogo" class="logo" src="" alt="Logo">
                <div class="event-name" id="eventNameDisplay">รายการแข่งขัน</div>
            </div>

            <div class="main-score-area">
                <div class="team-box" id="teamABox">
                    <div class="team-name" id="nameADisplay">TEAM A</div>
                    <div class="score" id="scoreADisplay">0</div>
                    <div class="stats-row">
                        <span>FOULS</span>
                        <span id="foulADisplay">0</span>
                    </div>
                </div>

                <div class="center-info">
                    <div class="timer-box" id="timeDisplay">00:00</div>
                    <div class="period-box">PERIOD: <span id="periodDisplay">1</span></div>
                </div>

                <div class="team-box" id="teamBBox">
                    <div class="team-name" id="nameBDisplay">TEAM B</div>
                    <div class="score" id="scoreBDisplay">0</div>
                    <div class="stats-row">
                        <span>FOULS</span>
                        <span id="foulBDisplay">0</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function resizeBoard() {
            const container = document.getElementById('scale-container');
            const board = document.getElementById('main-board');
            // เทียบความกว้างและสูง เพื่อหา Scale ที่เหมาะสมที่สุด
            const scaleX = container.clientWidth / 1920;
            const scaleY = container.clientHeight / 1080;
            const scale = Math.min(scaleX, scaleY);
            board.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resizeBoard);
        resizeBoard(); // เรียกใช้งานครั้งแรก
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5o9aY3La7nK7gCHbjM2ToolmnoE0y-is",
            authDomain: "post-it-kk-election.firebaseapp.com",
            projectId: "post-it-kk-election",
            storageBucket: "post-it-kk-election.firebasestorage.app",
            messagingSenderId: "323275742590",
            appId: "1:323275742590:web:7bbb20241bca6cca46672f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const stateRef = ref(db, 'scoreboard/state');

        onValue(stateRef, (snapshot) => {
            const state = snapshot.val();
            if (state) updateScoreboard(state);
        });

        function updateScoreboard(state) {
            document.getElementById('eventNameDisplay').innerText = state.eventName;
            document.getElementById('nameADisplay').innerText = state.nameA;
            document.getElementById('nameBDisplay').innerText = state.nameB;
            document.getElementById('scoreADisplay').innerText = state.scoreA;
            document.getElementById('scoreBDisplay').innerText = state.scoreB;
            document.getElementById('foulADisplay').innerText = state.foulA;
            document.getElementById('foulBDisplay').innerText = state.foulB;
            document.getElementById('periodDisplay').innerText = state.period;

            let m = state.timer.minutes.toString().padStart(2, '0');
            let s = state.timer.seconds.toString().padStart(2, '0');
            document.getElementById('timeDisplay').innerText = `${m}:${s}`;

            // จัดการโลโก้
            const logo = document.getElementById('mainLogo');
            if (state.showLogo && state.logoUrl) {
                logo.src = state.logoUrl;
                logo.style.display = 'block';
            } else {
                logo.style.display = 'none';
            }
        }
    </script>
</body>
</html>
