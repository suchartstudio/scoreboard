<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Scoreboard View (16:9 Static)</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700;900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: transparent; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Chakra Petch', sans-serif; }
        
        /* บังคับสัดส่วนเฟรมหลักให้ล็อกที่ 16:9 พอดีจอ */
        .scoreboard-container { width: 100vw; max-width: 100%; aspect-ratio: 16 / 9; position: relative; display: flex; justify-content: center; align-items: center; box-sizing: border-box; overflow: hidden; }
        
        /* โครงร่างพิกเซลแบบคงที่เพื่อควบคุมทุกตำแหน่งให้อยู่นิ่ง ไม่ขยับเขยื้อน */
        .board { width: 1920px; height: 1080px; transform-origin: center center; position: absolute; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; text-shadow: 3px 3px 6px rgba(0,0,0,0.9); overflow: hidden; }

        .header { display: flex; align-items: center; justify-content: center; margin-top: 40px; background: rgba(0,0,0,0.6); padding: 15px 60px; border-radius: 20px; border: 4px solid #fff; height: 150px; min-width: 600px; box-sizing: border-box; }
        .event-name { font-size: 55px; font-weight: 700; text-transform: uppercase; margin: 0 30px; text-align: center; white-space: nowrap; }
        .logo { max-height: 110px; max-width: 150px; border-radius: 8px; display: none; object-fit: contain; }

        .main-score-area { display: flex; justify-content: center; align-items: center; gap: 40px; margin-top: 40px; width: 100%; padding: 0 50px; box-sizing: border-box; }
        
        /* ออกแบบกล่องคะแนนตามสีเสื้อทีมแบบคงที่ ไม่สั่นไหว */
        .team-box { display: flex; flex-direction: column; align-items: center; border: 8px solid #ffffff; padding: 40px 20px; border-radius: 40px; width: 620px; height: 540px; box-sizing: border-box; justify-content: space-between; }

        /* ป้องกันตัวหนังสือขยับ ขยายความกว้างคงที่ */
        .team-name { font-size: 75px; font-weight: 900; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; height: 100px; line-height: 100px; }
        .score { font-size: 280px; font-weight: 900; line-height: 240px; text-align: center; width: 100%; font-variant-numeric: tabular-nums; margin: 10px 0; height: 240px; }
        
        .stats-row { display: flex; justify-content: space-between; width: 100%; font-size: 45px; padding: 0 20px; box-sizing: border-box; font-variant-numeric: tabular-nums; border-top: 2px dashed rgba(255,255,255,0.4); padding-top: 15px; }

        .center-info { display: flex; flex-direction: column; align-items: center; width: 500px; justify-content: center; }
        .timer-box { font-size: 150px; font-weight: 900; background: rgba(0,0,0,0.75); padding: 20px 0; border-radius: 30px; border: 5px solid #fff; font-variant-numeric: tabular-nums; margin-bottom: 25px; text-align: center; width: 100%; height: 220px; line-height: 180px; box-sizing: border-box; }
        .period-box { font-size: 55px; font-weight: 700; background: rgba(0,0,0,0.75); padding: 15px 0; border-radius: 20px; text-align: center; width: 100%; border: 3px solid #666; white-space: nowrap; }

        /* ส่วนแสดงประวัติเซตที่ผ่านไป ยึดด้านล่างสุด */
        .set-history-row { display: flex; justify-content: center; gap: 15px; width: 100%; margin-top: auto; margin-bottom: 40px; padding: 0 50px; box-sizing: border-box; }
        .set-badge { background: rgba(0,0,0,0.7); border: 3px solid #fff; padding: 10px 25px; border-radius: 15px; font-size: 35px; font-weight: bold; font-variant-numeric: tabular-nums; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="scoreboard-container" id="scale-container">
        <div class="board" id="main-board">
            
            <div class="header">
                <img id="mainLogo" class="logo" src="" alt="Logo">
                <div class="event-name" id="eventNameDisplay">รายการแข่งขัน</div>
            </div>

            <div class="main-score-area">
                <div class="team-box" id="teamABox">
                    <div class="team-name" id="nameADisplay">TEAM A</div>
                    <div class="score" id="scoreADisplay">0</div>
                    <div class="stats-row">
                        <span id="foulALabel">FOULS</span>
                        <span id="foulADisplay">0</span>
                    </div>
                </div>

                <div class="center-info">
                    <div class="timer-box" id="timeDisplay">00:00</div>
                    <div class="period-box"><span id="periodLabel">PERIOD</span>: <span id="periodDisplay">1</span></div>
                </div>

                <div class="team-box" id="teamBBox">
                    <div class="team-name" id="nameBDisplay">TEAM B</div>
                    <div class="score" id="scoreBDisplay">0</div>
                    <div class="stats-row">
                        <span id="foulBLabel">FOULS</span>
                        <span id="foulBDisplay">0</span>
                    </div>
                </div>
            </div>

            <div class="set-history-row" id="scoreboardHistoryRow"></div>

        </div>
    </div>

    <script>
        // ระบบ Auto-Scale เพื่อคุมสัดส่วน 16:9 ตลอดเวลา
        function resizeBoard() {
            const container = document.getElementById('scale-container');
            const board = document.getElementById('main-board');
            const scaleX = container.clientWidth / 1920;
            const scaleY = container.clientHeight / 1080;
            const scale = Math.min(scaleX, scaleY);
            board.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resizeBoard);
        resizeBoard();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5o9aY3La7nK7gCHbjM2ToolmnoE0y-is",
            authDomain: "post-it-kk-election.firebaseapp.com",
            projectId: "post-it-kk-election",
            storageBucket: "post-it-kk-election.firebasestorage.app",
            messagingSenderId: "323275742590",
            appId: "1:323275742590:web:7bbb20241bca6cca46672f",
            databaseURL: "https://post-it-kk-election-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const stateRef = ref(db, 'scoreboard/state');

        let localTimerState = { minutes: 0, seconds: 0, isRunning: false, lastUpdatedTime: 0 };
        let localDirection = 'up';

        onValue(stateRef, (snapshot) => {
            const state = snapshot.val();
            if (state) {
                updateScoreboard(state);
            }
        });

        // ลูปประมวลผลคำนวณเวลาฝั่ง Client หน้าจอ Scoreboard เองแบบอิสระ หมดปัญหามือถือสลีป
        setInterval(() => {
            if (localTimerState.isRunning && localTimerState.lastUpdatedTime > 0) {
                let baseSecs = (localTimerState.minutes * 60) + localTimerState.seconds;
                let diff = Math.floor((Date.now() - localTimerState.lastUpdatedTime) / 1000);
                let currentTotal = localDirection === 'up' ? baseSecs + diff : Math.max(0, baseSecs - diff);
                
                let m = Math.floor(currentTotal / 60).toString().padStart(2, '0');
                let s = (currentTotal % 60).toString().padStart(2, '0');
                document.getElementById('timeDisplay').innerText = `${m}:${s}`;
            }
        }, 200);

        function updateScoreboard(state) {
            document.getElementById('eventNameDisplay').innerText = state.eventName;
            document.getElementById('nameADisplay').innerText = state.nameA;
            document.getElementById('nameBDisplay').innerText = state.nameB;
            document.getElementById('scoreADisplay').innerText = state.scoreA;
            document.getElementById('scoreBDisplay').innerText = state.scoreB;
            document.getElementById('foulADisplay').innerText = state.foulA;
            document.getElementById('foulBDisplay').innerText = state.foulB;
            document.getElementById('periodDisplay').innerText = state.period;

            // คัดลอกค่าเวลาไปคำนวณที่เครื่องลูกข่าย
            localTimerState = state.timer || { minutes:0, seconds:0, isRunning:false, lastUpdatedTime:0 };
            localDirection = state.timerDirection || 'up';

            if (!localTimerState.isRunning) {
                let m = localTimerState.minutes.toString().padStart(2, '0');
                let s = localTimerState.seconds.toString().padStart(2, '0');
                document.getElementById('timeDisplay').innerText = `${m}:${s}`;
            }

            // แสดงหรือซ่อนโลโก้การแข่งขัน
            const logo = document.getElementById('mainLogo');
            if (state.showLogo && state.logoUrl) {
                logo.src = state.logoUrl;
                logo.style.display = 'block';
            } else {
                logo.style.display = 'none';
            }

            // จัดการเปลี่ยนชื่อฉลากป้ายข้อมูลตามประเภทกีฬา
            const pLabel = document.getElementById('periodLabel');
            const faLabel = document.getElementById('foulALabel');
            const fbLabel = document.getElementById('foulBLabel');
            
            if (state.sport === 'volleyball') {
                pLabel.innerText = 'SET';
                faLabel.innerText = 'SETS WON';
                fbLabel.innerText = 'SETS WON';
            } else if (state.sport === 'basketball') {
                pLabel.innerText = 'QUARTER';
                faLabel.innerText = 'FOULS';
                fbLabel.innerText = 'FOULS';
            } else {
                pLabel.innerText = 'HALF'; 
                faLabel.innerText = 'FOULS';
                fbLabel.innerText = 'FOULS';
            }

            // บังคับเปลี่ยนสีพื้นหลังและสีตัวอักษรตามสั่ง
            const board = document.getElementById('main-board');
            board.style.backgroundColor = state.bgColor || '#000000';
            board.style.color = state.textColor || '#ffffff';

            // ดึงสีเสื้อทีมที่ถูกสั่งเปลี่ยนจากหน้า Control มาเป็นพื้นกล่องโดยตรง พร้อมล็อกขอบเป็นสีขาวล้วน
            const teamABox = document.getElementById('teamABox');
            const teamBBox = document.getElementById('teamBBox');
            
            teamABox.style.backgroundColor = state.colorA || '#ff5252';
            teamBBox.style.backgroundColor = state.colorB || '#448aff';
            teamABox.style.borderColor = '#ffffff';
            teamBBox.style.borderColor = '#ffffff';

            // จัดการเรนเดอร์ข้อมูลประวัติคะแนนแต่ละเซต (Set History) ที่บันทึกไว้
            const historyRow = document.getElementById('scoreboardHistoryRow');
            historyRow.innerHTML = "";
            if (state.setHistory && state.setHistory.length > 0) {
                state.setHistory.forEach(item => {
                    let badge = document.createElement('div');
                    badge.className = "set-badge";
                    badge.innerText = `SET ${item.setNum}: ${item.scoreA} - ${item.scoreB}`;
                    historyRow.appendChild(badge);
                });
            }
        }
    </script>
</body>
</html>
