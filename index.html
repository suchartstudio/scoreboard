<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Scoreboard View</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700;900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: transparent; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Chakra Petch', sans-serif; }
        
        .scoreboard-container { width: 100vw; max-width: 100%; aspect-ratio: 16 / 9; position: relative; display: flex; justify-content: center; align-items: center; box-sizing: border-box; overflow: hidden; }
        
        .board { width: 1920px; height: 1080px; transform-origin: center center; position: absolute; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; text-shadow: 3px 3px 6px rgba(0,0,0,0.9); overflow: hidden; }

        .header { display: flex; align-items: center; justify-content: center; margin-top: 40px; background: rgba(0,0,0,0.6); padding: 15px 60px; border-radius: 20px; border: 4px solid #fff; height: 150px; min-width: 600px; box-sizing: border-box; transition: all 0.3s ease; }
        .event-name { font-size: 55px; font-weight: 700; text-transform: uppercase; margin: 0 30px; text-align: center; white-space: nowrap; transition: all 0.3s ease; }
        .logo { max-height: 110px; max-width: 150px; border-radius: 8px; object-fit: contain; }

        /* เมื่อไม่มีโลโก้รายการ ปรับขยายชื่อรายการให้ใหญ่ขึ้น */
        .header.no-logo .event-name { font-size: 70px; margin: 0; }

        .main-score-area { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; width: 100%; padding: 0 30px; box-sizing: border-box; }
        
        .team-box { display: flex; align-items: center; border: 8px solid #ffffff; padding: 25px; border-radius: 40px; width: 730px; height: 500px; box-sizing: border-box; transition: all 0.3s ease; }
        
        #teamABox { flex-direction: row; }
        #teamBBox { flex-direction: row-reverse; }

        .team-logo { width: 260px; height: 350px; object-fit: contain; }
        #logoA { margin-right: 30px; }
        #logoB { margin-left: 30px; }

        .team-info-col { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; width: 100%; transition: all 0.3s ease; }

        .score { font-size: 240px; font-weight: 900; line-height: 200px; text-align: center; width: 100%; font-variant-numeric: tabular-nums; margin: 0; height: 200px; transition: all 0.3s ease; }
        .team-name { font-size: 60px; font-weight: 900; text-align: center; width: 100%; white-space: nowrap; display: flex; justify-content: center; align-items: center; padding: 15px 0 5px 0; transition: all 0.3s ease; }
        
        /* [ไฮไลต์การปรับแต่ง] - เมื่อไม่มีโลโก้ทีม (เปิดใช้งานคลาส no-logo) */
        .team-box.no-logo .score { font-size: 280px; line-height: 240px; height: 240px; }
        .team-box.no-logo .team-name { font-size: 80px; padding: 20px 0 10px 0; }

        .penalty-dots { display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 10px; min-height: 50px; display: none; }
        .dot { width: 35px; height: 35px; border-radius: 50%; border: 4px solid #fff; box-shadow: 2px 2px 6px rgba(0,0,0,0.7); }
        .dot.hit { background-color: #4caf50; } 
        .dot.miss { background-color: #f44336; } 

        .stats-row { display: flex; justify-content: space-between; width: 100%; font-size: 40px; padding: 0 10px; box-sizing: border-box; font-variant-numeric: tabular-nums; border-top: 2px dashed rgba(255,255,255,0.4); padding-top: 10px; margin-top: 15px; visibility: visible; transition: all 0.3s ease; }

        .center-info { display: flex; flex-direction: column; align-items: center; width: 380px; justify-content: center; margin: 0 10px; }
        .timer-box { font-size: 120px; font-weight: 900; background: rgba(0,0,0,0.75); padding: 15px 0; border-radius: 30px; border: 5px solid #fff; font-variant-numeric: tabular-nums; margin-bottom: 25px; text-align: center; width: 100%; height: 180px; line-height: 140px; box-sizing: border-box; visibility: visible; }
        .period-box { font-size: 50px; font-weight: 700; background: rgba(0,0,0,0.75); padding: 15px 0; border-radius: 20px; text-align: center; width: 100%; border: 3px solid #666; white-space: nowrap; }

        .set-history-row { display: flex; justify-content: center; gap: 15px; width: 100%; margin-top: auto; margin-bottom: 50px; padding: 0 50px; box-sizing: border-box; }
        .set-badge { background: rgba(0,0,0,0.8); border: 3px solid #fff; padding: 10px 30px; border-radius: 20px; font-size: 40px; font-weight: bold; font-variant-numeric: tabular-nums; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="scoreboard-container" id="scale-container">
        <div class="board" id="main-board">
            
            <div class="header" id="mainHeader">
                <img id="mainLogo" class="logo" src="" alt="Main Logo">
                <div class="event-name" id="eventNameDisplay">รายการแข่งขัน</div>
            </div>

            <div class="main-score-area">
                <div class="team-box" id="teamABox">
                    <img id="logoA" class="team-logo" src="" alt="Team A">
                    <div class="team-info-col">
                        <div class="score" id="scoreADisplay">0</div>
                        <div class="team-name" id="nameADisplay">TEAM A</div>
                        <div class="penalty-dots" id="penaltyADisplay"></div>
                        <div class="stats-row" id="statsRowA">
                            <span id="foulALabel">FOULS</span>
                            <span id="foulADisplay">0</span>
                        </div>
                    </div>
                </div>

                <div class="center-info">
                    <div class="timer-box" id="timeDisplay">00:00</div>
                    <div class="period-box"><span id="periodLabel">PERIOD</span>: <span id="periodDisplay">1</span></div>
                </div>

                <div class="team-box" id="teamBBox">
                    <img id="logoB" class="team-logo" src="" alt="Team B">
                    <div class="team-info-col">
                        <div class="score" id="scoreBDisplay">0</div>
                        <div class="team-name" id="nameBDisplay">TEAM B</div>
                        <div class="penalty-dots" id="penaltyBDisplay"></div>
                        <div class="stats-row" id="statsRowB">
                            <span id="foulBLabel">FOULS</span>
                            <span id="foulBDisplay">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="set-history-row" id="scoreboardHistoryRow"></div>

        </div>
    </div>

    <script>
        function resizeBoard() {
            const container = document.getElementById('scale-container');
            const board = document.getElementById('main-board');
            const scaleX = container.clientWidth / 1920;
            const scaleY = container.clientHeight / 1080;
            const scale = Math.min(scaleX, scaleY);
            board.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resizeBoard);
        resizeBoard();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5o9aY3La7nK7gCHbjM2ToolmnoE0y-is",
            authDomain: "post-it-kk-election.firebaseapp.com",
            projectId: "post-it-kk-election",
            storageBucket: "post-it-kk-election.firebasestorage.app",
            messagingSenderId: "323275742590",
            appId: "1:323275742590:web:7bbb20241bca6cca46672f",
            databaseURL: "https://post-it-kk-election-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const stateRef = ref(db, 'scoreboard/state');

        let localTimerState = { minutes: 0, seconds: 0, isRunning: false, lastUpdatedTime: 0 };
        let localDirection = 'up';

        onValue(stateRef, (snapshot) => {
            const state = snapshot.val();
            if (state) updateScoreboard(state);
        });

        setInterval(() => {
            if (localTimerState.isRunning && localTimerState.lastUpdatedTime > 0) {
                let baseSecs = (localTimerState.minutes * 60) + localTimerState.seconds;
                let diff = Math.floor((Date.now() - localTimerState.lastUpdatedTime) / 1000);
                let currentTotal = localDirection === 'up' ? baseSecs + diff : Math.max(0, baseSecs - diff);
                
                let m = Math.floor(currentTotal / 60).toString().padStart(2, '0');
                let s = (currentTotal % 60).toString().padStart(2, '0');
                document.getElementById('timeDisplay').innerText = `${m}:${s}`;
            }
        }, 200);

        function renderPenaltyDots(containerId, penaltyData) {
            const container = document.getElementById(containerId);
            container.innerHTML = "";
            if (!penaltyData) return;
            let penaltyArray = Array.isArray(penaltyData) ? penaltyData : Object.values(penaltyData);
            penaltyArray.forEach(result => {
                let dot = document.createElement('div');
                dot.className = "dot " + result; 
                container.appendChild(dot);
            });
        }

        function updateScoreboard(state) {
            document.getElementById('eventNameDisplay').innerText = state.eventName;
            document.getElementById('nameADisplay').innerText = state.nameA;
            document.getElementById('nameBDisplay').innerText = state.nameB;
            document.getElementById('scoreADisplay').innerText = state.scoreA;
            document.getElementById('scoreBDisplay').innerText = state.scoreB;
            document.getElementById('foulADisplay').innerText = state.foulA;
            document.getElementById('foulBDisplay').innerText = state.foulB;
            document.getElementById('periodDisplay').innerText = state.period;

            localTimerState = state.timer || { minutes:0, seconds:0, isRunning:false, lastUpdatedTime:0 };
            localDirection = state.timerDirection || 'up';
            if (!localTimerState.isRunning) {
                let m = localTimerState.minutes.toString().padStart(2, '0');
                let s = localTimerState.seconds.toString().padStart(2, '0');
                document.getElementById('timeDisplay').innerText = `${m}:${s}`;
            }

            // จัดการโลโก้รายการ (สลับ display:none พร้อมดึงข้อมูลไปตรงกลาง)
            const mainLogo = document.getElementById('mainLogo');
            const mainHeader = document.getElementById('mainHeader');
            if (state.showLogo && state.logoUrl) { 
                mainLogo.src = state.logoUrl; 
                mainLogo.style.display = 'block'; 
                mainHeader.classList.remove('no-logo');
            } else { 
                mainLogo.style.display = 'none'; 
                mainHeader.classList.add('no-logo');
            }

            // จัดการโลโก้ทีม (สลับ display:none พร้อมดึงข้อมูลไปตรงกลางและขยายขนาดออโต้)
            const logoA = document.getElementById('logoA');
            const teamABox = document.getElementById('teamABox');
            if (state.showTeamLogos && state.logoUrlA) { 
                logoA.src = state.logoUrlA; 
                logoA.style.display = 'block'; 
                teamABox.classList.remove('no-logo');
            } else { 
                logoA.style.display = 'none'; 
                teamABox.classList.add('no-logo');
            }

            const logoB = document.getElementById('logoB');
            const teamBBox = document.getElementById('teamBBox');
            if (state.showTeamLogos && state.logoUrlB) { 
                logoB.src = state.logoUrlB; 
                logoB.style.display = 'block'; 
                teamBBox.classList.remove('no-logo');
            } else { 
                logoB.style.display = 'none'; 
                teamBBox.classList.add('no-logo');
            }

            const penContainerA = document.getElementById('penaltyADisplay');
            const penContainerB = document.getElementById('penaltyBDisplay');
            if (state.isPenalty) {
                penContainerA.style.display = 'flex';
                penContainerB.style.display = 'flex';
                renderPenaltyDots('penaltyADisplay', state.penaltyA);
                renderPenaltyDots('penaltyBDisplay', state.penaltyB);
            } else {
                penContainerA.style.display = 'none';
                penContainerB.style.display = 'none';
            }

            const pLabel = document.getElementById('periodLabel');
            const timerBox = document.getElementById('timeDisplay');
            const statsRowA = document.getElementById('statsRowA');
            const statsRowB = document.getElementById('statsRowB');

            if (state.sport === 'volleyball') {
                pLabel.innerText = 'SET';
                timerBox.style.visibility = 'hidden';
                statsRowA.style.visibility = 'visible';
                statsRowB.style.visibility = 'visible';
            } else if (state.sport === 'basketball') {
                pLabel.innerText = 'QUARTER';
                timerBox.style.visibility = 'visible';
                statsRowA.style.visibility = 'visible';
                statsRowB.style.visibility = 'visible';
            } else { 
                pLabel.innerText = 'HALF'; 
                timerBox.style.visibility = 'visible';
                statsRowA.style.visibility = 'hidden'; 
                statsRowB.style.visibility = 'hidden';
            }

            const board = document.getElementById('main-board');
            board.style.backgroundColor = state.bgColor || '#000000';
            board.style.color = state.textColor || '#ffffff';
            teamABox.style.backgroundColor = state.colorA || '#ff5252';
            teamBBox.style.backgroundColor = state.colorB || '#448aff';

            const historyRow = document.getElementById('scoreboardHistoryRow');
            historyRow.innerHTML = "";
            if (state.setHistory && state.setHistory.length > 0 && state.sport === 'volleyball') {
                state.setHistory.forEach(item => {
                    let badge = document.createElement('div');
                    badge.className = "set-badge";
                    badge.innerText = `SET ${item.setNum}: ${item.scoreA} - ${item.scoreB}`;
                    historyRow.appendChild(badge);
                });
            }
        }
    </script>
</body>
</html>
